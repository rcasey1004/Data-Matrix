<div id="stats-banner" style="background: #333; color: white; padding: 10px;">
    Sheets Scanned: <span id="sheet-count">0</span> / 3
</div>

<div id="running-totals" class="result-card">
    <h4>Current Combined Totals:</h4>
    <p>Leaks: <span id="total-leaks">0</span></p>
    <p>Flow Fails: <span id="total-flows">0</span></p>
</div>

<button class="btn" style="background: #4CAF50;" onclick="finalizeReport()"> FINALIZE & SAVE REPORT</button>
<button class="btn" style="background: #f44336;" onclick="ShiftReport.reset(); updateUI();"> RESET</button>

<script>
    function updateUI() {
        document.getElementById('sheet-count').innerText = ShiftReport.sheetsScanned;
        document.getElementById('total-leaks').innerText = ShiftReport.totals.leaks;
        document.getElementById('total-flows').innerText = ShiftReport.totals.flowFails;
        // ... update other fields
    }

    function finalizeReport() {
        alert(`Final Report for 2nd Shift:\nTotal Passed: ${ShiftReport.totals.passed}\nTotal Hours: ${ShiftReport.totals.hoursWorked}`);
        // Here you could trigger a print or save to CSV
    }
</script>
