<body>
    <div id="stats-banner" style="background: #333; color: white; padding: 10px; font-weight: bold;">
        Sheets Scanned: <span id="sheet-count">0</span> / 3
    </div>

    <div id="scan-zone" style="padding: 20px; border-bottom: 2px solid #ddd; background: #fff;">
        <input type="file" id="capture" accept="image/*" capture="environment" style="display:none">
        
        <button class="btn" style="background: #2196F3; font-size: 1.2em; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);" 
                onclick="document.getElementById('capture').click()">
            📷 SCAN DOCUMENT
        </button>
        
        <p style="color: #666; font-size: 0.8em; margin-top: 10px;">
            Tip: Align the sheet within the green guide lines
        </p>
    </div>

    <div id="running-totals" style="padding: 20px; background: #fafafa;">
        <h3 style="margin-top: 0;">Combined Totals</h3>
        <div style="display: flex; justify-content: space-around; background: white; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
            <div><strong>Leaks</strong><br><span id="total-leaks" style="font-size: 1.5em; color: #d32f2f;">0</span></div>
            <div><strong>Flow</strong><br><span id="total-flows" style="font-size: 1.5em; color: #1976D2;">0</span></div>
            <div><strong>Hours</strong><br><span id="total-hours" style="font-size: 1.5em; color: #388E3C;">0</span></div>
        </div>
    </div>

    <div style="padding: 20px;">
        <button class="btn" style="background: #4CAF50; width: 100%;" onclick="finalizeReport()">✅ FINALIZE & SAVE</button>
        <button class="btn" style="background: #f44336; width: 100%; margin-top: 10px;" onclick="location.reload()">🔄 RESET SESSION</button>
    </div>
</body>
